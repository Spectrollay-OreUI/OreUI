<!DOCTYPE html>
<html lang="zh">

<head>
    <base href="/">
    <meta charset="UTF-8">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
    <meta content="webkit" name="renderer">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link as="image" href="../../src/assets/images/Loading_white.gif" rel="preload">
    <link as="font" crossorigin="anonymous" href="../../src/assets/fonts/NotoSans-Bold.ttf" rel="preload" type="font/ttf">
    <link as="font" crossorigin="anonymous" href="../../src/assets/fonts/Minecraft-Ten.otf" rel="preload" type="font/otf">
    <link as="font" crossorigin="anonymous" href="../../src/assets/fonts/Minecraft-Seven.otf" rel="preload" type="font/otf">
    <link href="../../src/components/layout/loading/style.css" rel="stylesheet">
    <link href="../../src/assets/images/logo.png" rel="icon">
    <style>
        main {
            color: #FFFFFF;
            flex: 1;
        }
    </style>
    <script defer>
        const audios = {};

        function registerAudio(name, path) {
            const audio = new Audio(path);
            audio.preload = 'auto';
            audio.load();
            audios[name] = audio;
        }

        registerAudio('click', 'sounds/click.ogg');
        registerAudio('button', 'sounds/button.ogg');
    </script>
    <title>404 - OreUI</title>
</head>

<oreui-loading-mask>
    <oreui-loading-wrapper>
        <oreui-loading-spinner>
            <img alt="Loading" class="spinner_img" src="../../src/assets/images/Loading_white.gif"/>
        </oreui-loading-spinner>
        <oreui-loading-spinner>
            <span class="spinner_text">加载中</span>
        </oreui-loading-spinner>
    </oreui-loading-wrapper>
    <noscript>
        <style>
            oreui-loading-mask oreui-loading-wrapper {
                display: none !important;
            }
        </style>
        <oreui-loading-spinner>
            <img alt="Error" class="spinner_img_error" src="../../src/assets/images/ErrorMessage.png"/>
        </oreui-loading-spinner>
        <oreui-loading-spinner>
            <span class="spinner_text_error">页面无法加载: 当前环境不支持或已禁用脚本.<br>请更换支持脚本的环境或在设置中允许脚本后访问本站.</span>
        </oreui-loading-spinner>
    </noscript>
</oreui-loading-mask>

<body>
<oreui-display-area>
    <oreui-header>
        <oreui-header-left>
            <oreui-header-item class="header_item_left" data-event="back">
                <img alt="" class="header_left_icon" src="../../src/assets/images/Back.png"/>
            </oreui-header-item>
        </oreui-header-left>
        <oreui-header-logo>
            <oreui-header-title>404 - OreUI</oreui-header-title>
        </oreui-header-logo>
        <oreui-header-right>
            <oreui-header-item class="header_item_right header_item_blank"></oreui-header-item>
        </oreui-header-right>
    </oreui-header>
    <oreui-display-body>
        <oreui-scroll-view class="main_scroll_view">
            <oreui-scroll-container class="primary_scroll_container">
                <main class="scroll_container main_content_center" id="main">
                    <div class="display">
                        <p class="area_404-img"><img alt="404 Image" class="notice_img" id="404_img" src="../../src/assets/images/NotFound.png"/></p>
                        <p class="main_detail_center">404 - 页面未找到</p>
                        <p class="main_detail_center" style="font-size: 16px">请检查链接是否正确</p>
                        <p class="main_detail_center">
                            <oreui-button-group>
                                <oreui-button type="default" status="green" size="large" data-event="home" text="首页"></oreui-button>
                            </oreui-button-group>
                        </p>
                    </div>
                </main>
            </oreui-scroll-container>
            <oreui-scrollbar class="primary_oreui_scrollbar">
                <oreui-scrollbar-track></oreui-scrollbar-track>
                <oreui-scrollbar-thumb></oreui-scrollbar-thumb>
            </oreui-scrollbar>
        </oreui-scroll-view>
    </oreui-display-body>
</oreui-display-area>

</body>

<script type="module" src="../../src/index.js"></script>

</html>
